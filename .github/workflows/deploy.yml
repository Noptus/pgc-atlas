name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: ["dashboard/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd dashboard && npm ci && npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist
      - uses: actions/deploy-pages@v4
