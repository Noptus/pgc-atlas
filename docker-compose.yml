version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - pgc-cache:/root/.cache/pgc_explorer

  dashboard:
    build:
      context: ./dashboard
      dockerfile: ../Dockerfile.dashboard
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  pgc-cache:
